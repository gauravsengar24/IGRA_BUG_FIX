name: atan-${NETWORK}

volumes:
  kaspad_data:

x-default-logging: &default-logging
  driver: "${LOGGING_DRIVER:-json-file}"
  options:
    max-size: "1g"
    max-file: "10"
    compress: "true"
    tag: "atan-${NETWORK}/{{.Name}}/{{.ID}}"

x-default-healthcheck: &default-healthcheck
  interval: 10s
  timeout: 2s
  retries: 3
  start_period: 5s

# Shared NETWORK slug parser for the kaspad-atan entrypoint.
x-parse-network-slug-volume: &parse-network-slug-volume ./scripts/lib/parse-network-slug.sh:/app/parse-network-slug.sh:ro

services:
  kaspad:
    image: igranetwork/kaspad:${KASPAD_VERSION}
    restart: ${SERVICE_RESTART_POLICY:-unless-stopped}
    container_name: kaspad-atan
    logging: *default-logging
    ports:
      - "127.0.0.1:${KASPAD_GRPC_PORT}:${KASPAD_GRPC_PORT}"
      - "${KASPAD_P2P_PORT}:${KASPAD_P2P_PORT}"
      - "127.0.0.1:${KASPAD_BORSH_PORT}:${KASPAD_BORSH_PORT}"
      - "127.0.0.1:${KASPAD_JSON_PORT}:${KASPAD_JSON_PORT}"
    environment:
      - KASPAD_ADD_PEER
      - KASPAD_NONINTERACTIVE
      - KASPAD_UA_RULE
      - KASPAD_RETENTION_PERIOD_DAYS
      - ATAN_IMPORT_URL
      - CDN_BASE_URL
      - NETWORK
      - TX_ID_PREFIX
      - IGRA_LANE_ID
      - RUST_LOG=${RUST_LOG:-info,kaspa_atan_core=trace,kaspa_atan_server=trace,kaspa_atan_storage=trace,kaspa_atan_validation=trace,kaspa_atan_client=trace,kaspa_atan_importer=trace}
    entrypoint:
      - sh
      - -ec
      - |
        # Sets KASPA_FAMILY and KASPA_NETSUFFIX from NETWORK.
        . /app/parse-network-slug.sh

        ARGS="--disable-upnp \
          --rpclisten-borsh=0.0.0.0 \
          --rpclisten=0.0.0.0 \
          --rpclisten-json=0.0.0.0 \
          --listen=0.0.0.0 \
          --utxoindex \
          --logdir=/app/logs \
          --appdir=/app/data"

        # DNS seeds stay enabled; KASPAD_ADD_PEER only pins an extra peer.
        if [ "$$KASPA_FAMILY" != "mainnet" ]; then
          ARGS="--$$KASPA_FAMILY $$ARGS"
        fi
        if [ -n "$$KASPA_NETSUFFIX" ]; then ARGS="$$ARGS --netsuffix=$$KASPA_NETSUFFIX"; fi

        # Optional peer user-agent rule (e.g. reject;ver:kaspad<1.2.1).
        # Set KASPAD_UA_RULE in .env to apply; leave empty to skip.
        if [ -n "$$KASPAD_UA_RULE" ]; then
          ARGS="$$ARGS --ua-rule=$$KASPAD_UA_RULE"
        fi

        # Optional block-data retention window (days). Omit to keep kaspad's default.
        # Set KASPAD_RETENTION_PERIOD_DAYS in .env to apply.
        if [ -n "$$KASPAD_RETENTION_PERIOD_DAYS" ]; then
          ARGS="$$ARGS --retention-period-days=$$KASPAD_RETENTION_PERIOD_DAYS"
        fi

        # Empty TX_ID_PREFIX would render as --atan-transaction-id-prefix=
        # which kaspad accepts but treats as Box::new([]) — the empty prefix
        # matches every transaction, silently degrading to lane-only ATAN
        # filtering and defeating the post-Toccata "lane AND prefix" gate.
        # Hard-fail rather than ship an unrestricted prefix.
        if [ -z "$$TX_ID_PREFIX" ]; then
          echo "Error: TX_ID_PREFIX must be set; an empty --atan-transaction-id-prefix matches every tx and degrades post-Toccata filtering to lane-only mode" >&2
          exit 1
        fi

        # ATAN-only flags (no IGRA)
        ARGS="$$ARGS \
          --atan-listen \
          --atan-transaction-id-prefix=${TX_ID_PREFIX}"

        # Post-Toccata kaspad hard-exits at kaspad/src/daemon.rs:828 if
        # --igra-lane-id is missing when ATAN is enabled on a
        # Toccata-scheduled network. Mirror that here so the failure
        # message comes from the entrypoint, not buried in kaspad logs.
        if [ -z "$$IGRA_LANE_ID" ]; then
          echo "Error: IGRA_LANE_ID must be set; post-Toccata kaspad requires --igra-lane-id when --atan-listen is enabled (kaspad/src/daemon.rs:828)" >&2
          exit 1
        fi
        ARGS="$$ARGS --igra-lane-id=$$IGRA_LANE_ID"

        # TX_ID_PREFIX is guaranteed non-empty by the guard above and is the
        # ATAN import namespace: it is the network-specific CDN path segment
        # (97b1 mainnet, 97b4 testnet-10). IGRA_LANE_ID is the canonical lane
        # 97b10000 shared by every network, so it can't address per-network
        # CDN objects and is not used in the import URL.
        if [ -n "$$ATAN_IMPORT_URL" ]; then
          ARGS="$$ARGS --atan-import-url=$$ATAN_IMPORT_URL"
        elif [ -n "$$CDN_BASE_URL" ] && [ -n "$$NETWORK" ]; then
          ARGS="$$ARGS --atan-import-url=$$CDN_BASE_URL/$$NETWORK/$$TX_ID_PREFIX/index.pb"
        else
          echo "Warning: No ATAN import URL configured. Set ATAN_IMPORT_URL or CDN_BASE_URL+NETWORK to import historical data." >&2
        fi

        # Peer configuration
        if [ -n "$$KASPAD_ADD_PEER" ]; then
          ARGS="$$ARGS --addpeer=$$KASPAD_ADD_PEER"
        fi

        exec /app/kaspad $$ARGS
    volumes:
      - kaspad_data:/app/data/
      - ./logs/kaspad/:/app/logs/
      - *parse-network-slug-volume
    healthcheck:
      <<: *default-healthcheck
      test: ["CMD-SHELL", "bash -lc ': > /dev/tcp/127.0.0.1/${KASPAD_GRPC_PORT}'"]

  atan-uploader:
    image: igranetwork/atan-uploader:${ATAN_UPLOADER_VERSION}
    container_name: atan-uploader
    profiles: ["atan-uploader"]
    restart: ${SERVICE_RESTART_POLICY:-unless-stopped}
    logging: *default-logging
    depends_on:
      kaspad:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-atan-import}
      CDN_BASE_URL: ${CDN_BASE_URL}
      NETWORK: ${NETWORK}
      TX_ID_PREFIX: ${TX_ID_PREFIX:?TX_ID_PREFIX must be set (empty prefix degrades post-Toccata ATAN filtering to lane-only; see doc/node-operations/environment-reference.md)}
      IGRA_LANE_ID: ${IGRA_LANE_ID:?IGRA_LANE_ID must be set (4-byte post-Toccata lane namespace; see doc/node-operations/environment-reference.md)}
      DATADIR: ${DATADIR:-}
      UPLOAD_JITTER_MAX_SECONDS: ${UPLOAD_JITTER_MAX_SECONDS:-60}
    volumes:
      - kaspad_data:/app/data/
    healthcheck:
      <<: *default-healthcheck
      test: ["CMD-SHELL", "pgrep -f atan-uploader > /dev/null || exit 1"]
