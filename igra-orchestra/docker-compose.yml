name: igra-orchestra-${NETWORK:?NETWORK must be set to mainnet or testnet-10}

volumes:
  kaspad_data:
  traefik_certs:
  reth_data:
  reth_ipc:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=10m
networks:
  igra-network:
  traefik-network:

x-default-logging: &default-logging
  driver: "${LOGGING_DRIVER:-json-file}"
  options:
    max-size: "1g"
    max-file: "500"
    compress: "true"
    tag: "igra-orchestra-${NETWORK}/{{.Name}}/{{.ID}}"

x-default-healthcheck: &default-healthcheck
  interval: 10s
  timeout: 2s
  retries: 3
  start_period: 5s

x-default-service: &default-service
  networks:
    - igra-network
  logging: *default-logging

x-service-restart-policy: &service-restart-policy "${SERVICE_RESTART_POLICY:-no}"
x-dependency-watch-volume: &dependency-watch-volume ./scripts/lib/watch-dependencies.sh:/app/watch-dependencies.sh:ro
# Shared NETWORK slug parser for kaspad/kaswallet entrypoints.
x-parse-network-slug-volume: &parse-network-slug-volume ./scripts/lib/parse-network-slug.sh:/app/parse-network-slug.sh:ro

x-rpc-provider-environment: &rpc-provider-environment
  RUST_LOG: ${RUST_LOG}
  SERVER_HOST: "0.0.0.0"
  SERVER_PORT: 8535
  EL_URL: http://execution-layer:8545
  EL_WS_URL: ws://execution-layer:8546
  SECURITY_ENABLE_WHITELIST: "true"
  READ_ONLY: ${RPC_READ_ONLY}
  MIN_PROTOCOL_FEE_PER_GAS_GWEI: ${MIN_PROTOCOL_FEE_PER_GAS_GWEI}
  TX_ID_PREFIX: ${TX_ID_PREFIX:?TX_ID_PREFIX must be set (empty prefix degrades post-Toccata ATAN filtering to lane-only; see doc/node-operations/environment-reference.md)}
  IGRA_LANE_ID: ${IGRA_LANE_ID:?IGRA_LANE_ID must be set (4-byte post-Toccata lane namespace; see doc/node-operations/environment-reference.md)}

# Runtime config (no build) - for replica services
x-rpc-provider-runtime: &rpc-provider-runtime
  <<: *default-service
  image: igranetwork/rpc-provider:${RPC_PROVIDER_VERSION}
  restart: *service-restart-policy
  environment: *rpc-provider-environment
  expose:
    - "8535"
  entrypoint:
    - sh
    - -ec
    - |
      exec sh /app/watch-dependencies.sh \
        --tcp execution-layer execution-layer 8545 \
        --tcp-if READ_ONLY false kaswallet "$$KASWALLET_HOST" 8082 \
        -- /app/igra-rpc-provider
  volumes:
    - *dependency-watch-volume
  networks:
    - igra-network
    - traefik-network
  depends_on:
    execution-layer:
      condition: service_healthy
      required: false
  healthcheck:
    <<: *default-healthcheck
    test:
      - CMD-SHELL
      - >
        bash -lc '
          exec 3<>/dev/tcp/127.0.0.1/8535;
          printf "GET /health HTTP/1.0\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3;
          IFS= read -r line <&3;
          [[ "$$line" == *" 200 "* ]]
        ' &&
        bash -lc ': > /dev/tcp/execution-layer/8545' &&
        if [ "$$READ_ONLY" = "false" ]; then
          bash -lc ": > /dev/tcp/$$KASWALLET_HOST/8082";
        fi
  labels:
    - "traefik.enable=true"
    - "traefik.http.routers.rpc0.rule=Host(`${IGRA_ORCHESTRA_DOMAIN}`)"
    - "traefik.http.routers.rpc0.entrypoints=rpc"
    - "traefik.http.routers.rpc0.tls=true"
    - "traefik.http.routers.rpc0.tls.certresolver=myresolver"
    - "traefik.http.routers.rpc0.middlewares=cors,rpc-rate-limit,rpc-in-flight,rpc-buffering@file"
    - "traefik.http.services.rpc0.loadbalancer.server.port=8535"
    # Health check router - HTTPS (port 443) for load balancer health checks
    - "traefik.http.routers.health.rule=Host(`${IGRA_ORCHESTRA_DOMAIN}`) && PathPrefix(`/health`) && Method(`GET`)"
    - "traefik.http.routers.health.entrypoints=websecure"
    - "traefik.http.routers.health.tls=true"
    - "traefik.http.routers.health.tls.certresolver=myresolver"
    - "traefik.http.routers.health.middlewares=health-rate-limit@file"
    - "traefik.http.routers.health.service=rpc0"
    # Health check router - HTTP (port 80) - bypasses HTTP-to-HTTPS redirect for load balancers
    - "traefik.http.routers.health-http.rule=Host(`${IGRA_ORCHESTRA_DOMAIN}`) && PathPrefix(`/health`) && Method(`GET`)"
    - "traefik.http.routers.health-http.entrypoints=web"
    - "traefik.http.routers.health-http.middlewares=health-rate-limit@file"
    - "traefik.http.routers.health-http.service=rpc0"

# Build config (extends runtime) - for primary service only
x-rpc-provider-build: &rpc-provider-build
  <<: *rpc-provider-runtime
  build:
    context: build/repos/igra-rpc-provider
    dockerfile: Dockerfile
    ssh:
      - default

# Runtime config (no build) - for replica services
x-kaswallet-runtime: &kaswallet-runtime
  <<: *default-service
  image: igranetwork/kaswallet:${KASWALLET_VERSION}
  restart: *service-restart-policy
  expose:
    - "8082"
  environment:
    - RUST_LOG
    - NETWORK
    - KASPAD_HOST
    - KASPAD_GRPC_PORT
    # Pinned kaswallet image tag (e.g. 2.3, 3.0, or devnet). The entrypoint
    # reads its major version to decide whether to forward --subnetwork-id:
    # only kaswallet v3+ understands that flag; v2.x rejects it and crash-loops.
    - KASWALLET_VERSION
    # Operator-facing 4-byte lane namespace (e.g. 97b10000). For kaswallet v3+
    # the entrypoint forwards it to kaswallet-daemon as --subnetwork-id (and
    # hard-fails if unset), mirroring the kaspad --igra-lane-id pattern below so
    # all lane-id wiring lives at the entrypoint layer. On pre-Toccata v2.x the
    # flag is skipped and the daemon defaults to SUBNETWORK_ID_NATIVE / v0
    # transactions, which is correct pre-Toccata. (The daemon also accepts
    # KASWALLET_SUBNETWORK_ID via clap env=; we deliberately do not use that path.)
    - IGRA_LANE_ID
  extra_hosts:
    - "host.docker.internal:host-gateway"
  depends_on:
    kaspad:
      condition: service_healthy
      required: false
  entrypoint:
    - sh
    - -ec
    - |
      # Sets KASPA_FAMILY and KASPA_NETSUFFIX from NETWORK.
      . /app/parse-network-slug.sh

      ARGS="--logs-level=$$RUST_LOG --keys /app/keys.json --server grpc://$$KASPAD_HOST:$$KASPAD_GRPC_PORT --listen 0.0.0.0:8082"
      if [ "$$KASPA_FAMILY" = "mainnet" ]; then
        ARGS="--enable-mainnet-pre-launch $$ARGS"
      else
        ARGS="--$$KASPA_FAMILY $$ARGS"
        if [ "$$KASPA_FAMILY" = "testnet" ] && [ -n "$$KASPA_NETSUFFIX" ]; then
          ARGS="$$ARGS --testnet-suffix=$$KASPA_NETSUFFIX"
        fi
      fi
      # kaswallet only learned --subnetwork-id in v3 (post-Toccata). v2.x
      # rejects it ("unexpected argument") and crash-loops, so gate the flag on
      # the pinned KASWALLET_VERSION: pass it for v3+ (and source tags like
      # devnet/latest), skip it for any numeric major < 3 (e.g. 2.3), where the
      # daemon correctly defaults to SUBNETWORK_ID_NATIVE / pre-Toccata (v0)
      # transactions.
      KASWALLET_MAJOR="$${KASWALLET_VERSION%%.*}"
      case "$$KASWALLET_MAJOR" in
        ''|*[!0-9]*) PASS_SUBNETWORK=1 ;;
        *) if [ "$$KASWALLET_MAJOR" -ge 3 ]; then PASS_SUBNETWORK=1; else PASS_SUBNETWORK=0; fi ;;
      esac
      if [ "$$PASS_SUBNETWORK" = "1" ]; then
        if [ -z "$$IGRA_LANE_ID" ]; then
          echo "Error: IGRA_LANE_ID must be set for kaswallet v3+; without it the daemon defaults to SUBNETWORK_ID_NATIVE and emits pre-Toccata (v0) transactions that post-Toccata kaspad rejects" >&2
          exit 1
        fi
        ARGS="$$ARGS --subnetwork-id=$$IGRA_LANE_ID"
      fi
      exec sh /app/watch-dependencies.sh \
        --tcp kaspad "$$KASPAD_HOST" "$$KASPAD_GRPC_PORT" \
        -- /app/kaswallet-daemon $$ARGS
  volumes:
    - *parse-network-slug-volume
  healthcheck:
    <<: *default-healthcheck
    test:
      - CMD-SHELL
      - >
        bash -lc ': > /dev/tcp/127.0.0.1/8082' &&
        bash -lc ": > /dev/tcp/$$KASPAD_HOST/$$KASPAD_GRPC_PORT"

# Build config (extends runtime) - for primary service only
x-kaswallet-build: &kaswallet-build
  <<: *kaswallet-runtime
  build:
    context: build/repos/kaswallet
    dockerfile: Dockerfile
    ssh:
      - default

services:
  # Core Services
  kaspad:
    <<: *default-service
    build:
      context: build/repos/rusty-kaspa-private
      dockerfile: build/Dockerfile.kaspad
      ssh:
        - default
    image: igranetwork/kaspad:${KASPAD_VERSION}
    restart: *service-restart-policy
    profiles: ["kaspad", "backend"]
    container_name: kaspad
    depends_on:
      execution-layer:
        condition: service_healthy
    ports:
      - "127.0.0.1:${KASPAD_GRPC_PORT}:${KASPAD_GRPC_PORT}"
      - "${KASPAD_P2P_PORT}:${KASPAD_P2P_PORT}"
      - "127.0.0.1:${KASPAD_BORSH_PORT}:${KASPAD_BORSH_PORT}"
      - "127.0.0.1:${KASPAD_JSON_PORT}:${KASPAD_JSON_PORT}"
    environment:
      - KASPAD_ADD_PEER
      - KASPAD_NONINTERACTIVE
      - KASPAD_UA_RULE
      - KASPAD_RETENTION_PERIOD_DAYS
      - ENABLE_PERF_DIAGNOSTICS
      - ENABLE_EVENT_LOGGING
      - WARM_START_BLOCK
      - IGRA_SKIP_LOCK_SCRIPT_CHECK
      - ATAN_IMPORT_URL
      - CDN_BASE_URL
      - NETWORK
      - TX_ID_PREFIX
      - IGRA_LANE_ID
      - IGRA_ENABLE
      - POST_FORK_LOCK_SCRIPT_PUBKEY
      - LOCK_SCRIPT_FORK_DAA_SCORE
      - RUST_LOG=info,kaspa_viaduct=trace,kaspa_igra_adapter=trace,kaspa_atan_core=trace,kaspa_atan_server=trace,kaspa_atan_storage=trace,kaspa_atan_validation=trace,kaspa_atan_client=trace,kaspa_atan_importer=trace
    entrypoint:
      - sh
      - -ec
      - |
        # Sets KASPA_FAMILY and KASPA_NETSUFFIX from NETWORK.
        . /app/parse-network-slug.sh

        ARGS="--disable-upnp \
          --rpclisten-borsh=0.0.0.0 \
          --rpclisten=0.0.0.0 \
          --rpclisten-json=0.0.0.0 \
          --listen=0.0.0.0 \
          --utxoindex \
          --logdir=/app/logs \
          --appdir=/app/data"

        # DNS seeds stay enabled; KASPAD_ADD_PEER only pins an extra peer.
        if [ "$$KASPA_FAMILY" != "mainnet" ]; then
          ARGS="--$$KASPA_FAMILY $$ARGS"
        fi
        if [ -n "$$KASPA_NETSUFFIX" ]; then ARGS="$$ARGS --netsuffix=$$KASPA_NETSUFFIX"; fi

        # Optional peer user-agent rule (e.g. reject;ver:kaspad<1.2.1).
        # Set KASPAD_UA_RULE in .env to apply; leave empty to skip.
        if [ -n "$$KASPAD_UA_RULE" ]; then
          ARGS="$$ARGS --ua-rule=$$KASPAD_UA_RULE"
        fi

        # Optional block-data retention window (days). Omit to keep kaspad's default.
        # Set KASPAD_RETENTION_PERIOD_DAYS in .env to apply.
        if [ -n "$$KASPAD_RETENTION_PERIOD_DAYS" ]; then
          ARGS="$$ARGS --retention-period-days=$$KASPAD_RETENTION_PERIOD_DAYS"
        fi

        IGRA_ENABLED="$${IGRA_ENABLE:-true}"
        if [ "$$IGRA_ENABLED" = "true" ]; then
          # Empty TX_ID_PREFIX would render as --atan-transaction-id-prefix=
          # which kaspad accepts but treats as Box::new([]) — the empty prefix
          # matches every transaction, silently degrading to lane-only ATAN
          # filtering and defeating the post-Toccata "lane AND prefix" gate.
          # Hard-fail rather than ship an unrestricted prefix.
          if [ -z "$$TX_ID_PREFIX" ]; then
            echo "Error: TX_ID_PREFIX must be set when IGRA_ENABLE=true; an empty --atan-transaction-id-prefix matches every tx and degrades post-Toccata filtering to lane-only mode" >&2
            exit 1
          fi
          ARGS="$$ARGS \
            --igra-enable \
            --atan-listen \
            --atan-transaction-id-prefix=${TX_ID_PREFIX} \
            --viaduct-start-daa-score=${IGRA_LAUNCH_DAA_SCORE} \
            --igra-l1-reference-timestamp=${L1_REFERENCE_TIMESTAMP} \
            --igra-l1-reference-daa-score=${L1_REFERENCE_DAA_SCORE} \
            --igra-genesis-hash=${GENESIS_BLOCK_HASH} \
            --igra-min-fee-per-gas-gwei=${MIN_PROTOCOL_FEE_PER_GAS_GWEI} \
            --igra-jwt-path=/app/jwt.hex \
            --igra-lock-script-pubkey=${IGRA_LOCK_SCRIPT_PUBKEY} \
            --igra-entry-min-amount=${IGRA_ENTRY_MIN_AMOUNT} \
            --igra-el-host=http://execution-layer"

          # Post-Toccata kaspad hard-exits at kaspad/src/daemon.rs:828 if
          # --igra-lane-id is missing when ATAN is enabled on a
          # Toccata-scheduled network. Mirror that here so the failure
          # message comes from the entrypoint, not buried in kaspad logs.
          if [ -z "$$IGRA_LANE_ID" ]; then
            echo "Error: IGRA_LANE_ID must be set when IGRA_ENABLE=true; post-Toccata kaspad requires --igra-lane-id when ATAN is enabled (kaspad/src/daemon.rs:828)" >&2
            exit 1
          fi
          ARGS="$$ARGS --igra-lane-id=$$IGRA_LANE_ID"
          [ "$$ENABLE_PERF_DIAGNOSTICS" = "true" ] && ARGS="$$ARGS --igra-enable-perf-diagnostics"
          [ "$$ENABLE_EVENT_LOGGING" = "true" ] && ARGS="$$ARGS --igra-enable-event-logging"
          [ -n "$$WARM_START_BLOCK" ] && ARGS="$$ARGS --igra-warm-start-block=$$WARM_START_BLOCK"
          [ "$$IGRA_SKIP_LOCK_SCRIPT_CHECK" = "true" ] && ARGS="$$ARGS --igra-skip-lock-script-check"
          if [ -n "$$POST_FORK_LOCK_SCRIPT_PUBKEY" ] && [ -z "$$LOCK_SCRIPT_FORK_DAA_SCORE" ]; then
            echo "Error: LOCK_SCRIPT_FORK_DAA_SCORE must be set when POST_FORK_LOCK_SCRIPT_PUBKEY is set" >&2; exit 1
          fi
          if [ -z "$$POST_FORK_LOCK_SCRIPT_PUBKEY" ] && [ -n "$$LOCK_SCRIPT_FORK_DAA_SCORE" ]; then
            echo "Error: POST_FORK_LOCK_SCRIPT_PUBKEY must be set when LOCK_SCRIPT_FORK_DAA_SCORE is set" >&2; exit 1
          fi
          [ -n "$$POST_FORK_LOCK_SCRIPT_PUBKEY" ] && ARGS="$$ARGS --igra-post-fork-lock-script-pubkey=$$POST_FORK_LOCK_SCRIPT_PUBKEY"
          [ -n "$$LOCK_SCRIPT_FORK_DAA_SCORE" ] && ARGS="$$ARGS --igra-lock-script-fork-daa-score=$$LOCK_SCRIPT_FORK_DAA_SCORE"

          # TX_ID_PREFIX is guaranteed non-empty by the guard above and is the
          # ATAN import namespace: it is the network-specific CDN path segment
          # (97b1 mainnet, 97b4 testnet-10). IGRA_LANE_ID is the canonical lane
          # 97b10000 shared by every network, so it can't address per-network
          # CDN objects and is not used in the import URL.
          if [ -n "$$ATAN_IMPORT_URL" ]; then
            ARGS="$$ARGS --atan-import-url=$$ATAN_IMPORT_URL"
          elif [ -n "$$CDN_BASE_URL" ] && [ -n "$$NETWORK" ]; then
            ARGS="$$ARGS --atan-import-url=$$CDN_BASE_URL/$$NETWORK/$$TX_ID_PREFIX/index.pb"
          else
            echo "Error: CDN_BASE_URL and NETWORK must be set for ATAN import (or set ATAN_IMPORT_URL explicitly)" >&2
            exit 1
          fi
        fi

        # Peer configuration
        if [ -n "$$KASPAD_ADD_PEER" ]; then
          ARGS="$$ARGS --addpeer=$$KASPAD_ADD_PEER"
        fi

        exec sh /app/watch-dependencies.sh \
          --tcp execution-layer execution-layer 8545 \
          -- /app/kaspad $$ARGS
    volumes:
      - kaspad_data:/app/data/
      - ./logs/kaspad/:/app/logs/  # Event logs when ENABLE_EVENT_LOGGING=true
      - ./keys/jwt.hex:/app/jwt.hex:ro
      - *dependency-watch-volume
      - *parse-network-slug-volume
    networks:
      - igra-network
    healthcheck:
      <<: *default-healthcheck
      test:
        - CMD-SHELL
        - >
          bash -lc ': > /dev/tcp/127.0.0.1/${KASPAD_GRPC_PORT}' &&
          bash -lc ': > /dev/tcp/execution-layer/8545'

  execution-layer:
    <<: *default-service
    build:
      context: build/repos/reth-private
      dockerfile: Dockerfile
      ssh:
        - default
      args:
        BUILD_PROFILE: release
    image: igranetwork/reth:${RETH_VERSION}
    restart: *service-restart-policy
    container_name: execution-layer
    profiles: ["execution-layer", "kaspad", "backend"]
    entrypoint: /app/run-igra-el.sh
    ports:
      - "127.0.0.1:9545:8545"  # open 8545 on localhost for blockscout
      - "127.0.0.1:9546:8546"  # open 8546 on localhost for blockscout
    expose:
      - "8545"
      - "8546"
      - "8551"
      - "9001"
    environment:
      L1_REFERENCE_TIMESTAMP: ${L1_REFERENCE_TIMESTAMP}
      L1_REFERENCE_DAA_SCORE: ${L1_REFERENCE_DAA_SCORE}
      CHAIN_ID: ${IGRA_CHAIN_ID}
      ONE_TIME_ADDRESS: ${EL_ONE_TIME_ADDRESS}
      IGRA_LAUNCH_DAA_SCORE: ${IGRA_LAUNCH_DAA_SCORE}
      TX_ID_PREFIX: ${TX_ID_PREFIX:?TX_ID_PREFIX must be set (empty prefix degrades post-Toccata ATAN filtering to lane-only; see doc/node-operations/environment-reference.md)}
      IGRA_LANE_ID: ${IGRA_LANE_ID:?IGRA_LANE_ID must be set (4-byte post-Toccata lane namespace; see doc/node-operations/environment-reference.md)}
      MIN_PROTOCOL_FEE_PER_GAS_GWEI: ${MIN_PROTOCOL_FEE_PER_GAS_GWEI}
      IGRA_LOCK_SCRIPT_PUBKEY: ${IGRA_LOCK_SCRIPT_PUBKEY:-}
      IGRA_ENTRY_MIN_AMOUNT: ${IGRA_ENTRY_MIN_AMOUNT}
      BITCOIN_BLOCK_HASH: ${BITCOIN_BLOCK_HASH}
      ETHEREUM_BLOCK_HASH: ${ETHEREUM_BLOCK_HASH}
      KASPA_BLOCK_HASH: ${KASPA_BLOCK_HASH}
      POST_FORK_LOCK_SCRIPT_PUBKEY: ${POST_FORK_LOCK_SCRIPT_PUBKEY:-}
      LOCK_SCRIPT_FORK_DAA_SCORE: ${LOCK_SCRIPT_FORK_DAA_SCORE:-}
      NETWORK_PARAMS_OUTPUT: /app/network-params/network-params.md
    volumes:
      - reth_data:/app/data/
      - ./keys/jwt.hex:/app/jwt.hex
      - reth_ipc:/app/socket
      - ./network-params:/app/network-params
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.el_stats.rule=Host(`${IGRA_ORCHESTRA_DOMAIN}`)"
      - "traefik.http.routers.el_stats.entrypoints=el_stats"
      - "traefik.http.routers.el_stats.service=el_stats_svc"
      - "traefik.http.routers.el_stats.tls=true"
      - "traefik.http.routers.el_stats.tls.certresolver=myresolver"
      - "traefik.http.routers.el_stats.middlewares=cors,rpc-rate-limit,rpc-in-flight,rpc-buffering@file"
      - "traefik.http.services.el_stats_svc.loadbalancer.server.port=9001"
    healthcheck:
      <<: *default-healthcheck
      test:
        - CMD-SHELL
        - >
          test -S /app/socket/auth.ipc &&
          bash -lc ': > /dev/tcp/127.0.0.1/8545'

  node-health-check-client:
    image: igranetwork/node-health-check-client:${NODE_HEALTH_CHECK_VERSION}
    profiles: ["node-health-check-client", "backend"]
    container_name: node-health-check-client
    networks:
      - igra-network
    # Gate startup on execution-layer: this client polls execution-layer:8545 and,
    # if started in parallel on `compose up`, races reth's boot and goes stale.
    # required:false keeps the standalone node-health-check-client profile working.
    depends_on:
      execution-layer:
        condition: service_healthy
        required: false
    environment:
      - NODE_RPC_URL=http://execution-layer:8545
      - MONITOR_URL=http://${NODE_HEALTH_CHECK_URL}:8081
      - NODE_ID=${NODE_ID}
      - API_KEY=${HEALTH_CHECK_API_KEY}
      - POLL_INTERVAL=8
      - NETWORK=${NETWORK}
      - GENESIS_BLOCK_HASH=${GENESIS_BLOCK_HASH}
      - KASPAD_VERSION=${KASPAD_VERSION}
      - RETH_VERSION=${RETH_VERSION}
      - KASWALLET_VERSION=${KASWALLET_VERSION}
      - RPC_PROVIDER_VERSION=${RPC_PROVIDER_VERSION}
      - NODE_HEALTH_CHECK_VERSION=${NODE_HEALTH_CHECK_VERSION}
      - ATAN_UPLOADER_VERSION=${ATAN_UPLOADER_VERSION}
    # Image lacks ps/pgrep, so its baked-in ps-based HEALTHCHECK always fails
    # ("sh: 1: ps: not found"). App runs as PID 1; check /proc/1/cmdline with grep instead.
    healthcheck:
      <<: *default-healthcheck
      test: ["CMD-SHELL", "grep -qa node-health-check-client /proc/1/cmdline || exit 1"]
    restart: unless-stopped

  # Worker Services
  rpc-provider-0:
    <<: *rpc-provider-build
    profiles: ["frontend-w1", "frontend-w2", "frontend-w3", "frontend-w4", "frontend-w5", "frontend-w6", "frontend-w7", "frontend-w8", "frontend-w9", "frontend-w10", "frontend-w11", "frontend-w12", "frontend-w13", "frontend-w14", "frontend-w15", "frontend-w16", "frontend-w17", "frontend-w18", "frontend-w19", "frontend-w20"]
    container_name: rpc-provider-0
    environment:
      <<: *rpc-provider-environment
      KASWALLET_HOST: kaswallet-0
      WALLET_DAEMON_URI: http://kaswallet-0:8082
      WALLET_TO_ADDRESS: ${W0_WALLET_TO_ADDRESS}
      KASWALLET_PASSWORD: ${W0_KASWALLET_PASSWORD}

  kaswallet-0:
    <<: *kaswallet-build
    profiles: ["frontend-w1", "frontend-w2", "frontend-w3", "frontend-w4", "frontend-w5", "frontend-w6", "frontend-w7", "frontend-w8", "frontend-w9", "frontend-w10", "frontend-w11", "frontend-w12", "frontend-w13", "frontend-w14", "frontend-w15", "frontend-w16", "frontend-w17", "frontend-w18", "frontend-w19", "frontend-w20"]
    container_name: kaswallet-0
    ports:
      - "127.0.0.1:8082:8082"  # open 8082 on localhost for entry transactions
    volumes:
      - ./keys/keys.kaswallet-0.json:/app/keys.json
      - *dependency-watch-volume
      - *parse-network-slug-volume

  rpc-provider-1:
    <<: *rpc-provider-runtime
