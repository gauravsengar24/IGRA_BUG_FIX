  # Traefik Service
  traefik:
    <<: *default-service
    image: traefik:v3
    restart: *service-restart-policy
    profiles: ["frontend-w1", "frontend-w2", "frontend-w3", "frontend-w4", "frontend-w5", "frontend-w6", "frontend-w7", "frontend-w8", "frontend-w9", "frontend-w10", "frontend-w11", "frontend-w12", "frontend-w13", "frontend-w14", "frontend-w15", "frontend-w16", "frontend-w17", "frontend-w18", "frontend-w19", "frontend-w20"]
    container_name: traefik
    # Block startup until at least one rpc-provider replica is HTTP-ready
    # (its healthcheck now probes /health, not just TCP). This eliminates the
    # boot race where watch-dependencies.sh would give up before rpc-provider
    # finished initializing and exit traefik with `restart: no` on testnet.
    depends_on:
      rpc-provider-0:
        condition: service_healthy
    entrypoint:
      - sh
      - /app/watch-dependencies.sh
      - --http-any
      - rpc-backends
      - http://rpc-provider-0:8535/health,http://rpc-provider-1:8535/health,http://rpc-provider-2:8535/health,http://rpc-provider-3:8535/health,http://rpc-provider-4:8535/health,http://rpc-provider-5:8535/health,http://rpc-provider-6:8535/health,http://rpc-provider-7:8535/health,http://rpc-provider-8:8535/health,http://rpc-provider-9:8535/health,http://rpc-provider-10:8535/health,http://rpc-provider-11:8535/health,http://rpc-provider-12:8535/health,http://rpc-provider-13:8535/health,http://rpc-provider-14:8535/health,http://rpc-provider-15:8535/health,http://rpc-provider-16:8535/health,http://rpc-provider-17:8535/health,http://rpc-provider-18:8535/health,http://rpc-provider-19:8535/health
      - --
      - traefik
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      # File provider for middlewares the docker provider fails to resolve
      # across containers (rpc-buffering, health-rate-limit). See
      # config/traefik/dynamic.yml. Routers reference them as `<name>@file`.
      - "--providers.file.directory=/etc/traefik"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.rpc.address=:8545"
      - "--entrypoints.explorer_http.address=:8008"
      - "--entrypoints.explorer_ws.address=:8001"
      - "--entrypoints.explorer_rest.address=:8010"
      - "--entrypoints.el_stats.address=:9001"
      - "--log.level=${TRAEFIK_LOG_LEVEL:-WARN}"
      # DoS hygiene (ENG-1020): entry-point responding timeouts and XFF trust
      # for every public entry point. Empty ORCHESTRA_TRUSTED_PROXIES = trust no
      # proxy (use TCP peer IP); set it to the RPC LB egress IP(s) when this
      # orchestra sits behind the LB.
      - "--entrypoints.rpc.transport.respondingTimeouts.readTimeout=${ENTRYPOINT_READ_TIMEOUT:-30s}"
      - "--entrypoints.rpc.transport.respondingTimeouts.writeTimeout=${ENTRYPOINT_WRITE_TIMEOUT:-30s}"
      - "--entrypoints.rpc.transport.respondingTimeouts.idleTimeout=${ENTRYPOINT_IDLE_TIMEOUT:-60s}"
      - "--entrypoints.rpc.forwardedHeaders.trustedIPs=${ORCHESTRA_TRUSTED_PROXIES:-}"
      - "--entrypoints.websecure.transport.respondingTimeouts.readTimeout=${ENTRYPOINT_READ_TIMEOUT:-30s}"
      - "--entrypoints.websecure.transport.respondingTimeouts.writeTimeout=${ENTRYPOINT_WRITE_TIMEOUT:-30s}"
      - "--entrypoints.websecure.transport.respondingTimeouts.idleTimeout=${ENTRYPOINT_IDLE_TIMEOUT:-60s}"
      - "--entrypoints.websecure.forwardedHeaders.trustedIPs=${ORCHESTRA_TRUSTED_PROXIES:-}"
      - "--entrypoints.web.transport.respondingTimeouts.readTimeout=${ENTRYPOINT_READ_TIMEOUT:-30s}"
      - "--entrypoints.web.transport.respondingTimeouts.writeTimeout=${ENTRYPOINT_WRITE_TIMEOUT:-30s}"
      - "--entrypoints.web.transport.respondingTimeouts.idleTimeout=${ENTRYPOINT_IDLE_TIMEOUT:-60s}"
      - "--entrypoints.web.forwardedHeaders.trustedIPs=${ORCHESTRA_TRUSTED_PROXIES:-}"
      - "--entrypoints.explorer_http.transport.respondingTimeouts.readTimeout=${ENTRYPOINT_READ_TIMEOUT:-30s}"
      - "--entrypoints.explorer_http.transport.respondingTimeouts.writeTimeout=${ENTRYPOINT_WRITE_TIMEOUT:-30s}"
      - "--entrypoints.explorer_http.transport.respondingTimeouts.idleTimeout=${ENTRYPOINT_IDLE_TIMEOUT:-60s}"
      - "--entrypoints.explorer_http.forwardedHeaders.trustedIPs=${ORCHESTRA_TRUSTED_PROXIES:-}"
      # WebSocket: readTimeout=0 and writeTimeout=0 so long-lived streams aren't dropped.
      - "--entrypoints.explorer_ws.transport.respondingTimeouts.readTimeout=${ENTRYPOINT_WS_READ_TIMEOUT:-0}"
      - "--entrypoints.explorer_ws.transport.respondingTimeouts.writeTimeout=${ENTRYPOINT_WS_WRITE_TIMEOUT:-0}"
      - "--entrypoints.explorer_ws.transport.respondingTimeouts.idleTimeout=${ENTRYPOINT_IDLE_TIMEOUT:-60s}"
      - "--entrypoints.explorer_ws.forwardedHeaders.trustedIPs=${ORCHESTRA_TRUSTED_PROXIES:-}"
      - "--entrypoints.explorer_rest.transport.respondingTimeouts.readTimeout=${ENTRYPOINT_READ_TIMEOUT:-30s}"
      - "--entrypoints.explorer_rest.transport.respondingTimeouts.writeTimeout=${ENTRYPOINT_WRITE_TIMEOUT:-30s}"
      - "--entrypoints.explorer_rest.transport.respondingTimeouts.idleTimeout=${ENTRYPOINT_IDLE_TIMEOUT:-60s}"
      - "--entrypoints.explorer_rest.forwardedHeaders.trustedIPs=${ORCHESTRA_TRUSTED_PROXIES:-}"
      - "--entrypoints.el_stats.transport.respondingTimeouts.readTimeout=${ENTRYPOINT_READ_TIMEOUT:-30s}"
      - "--entrypoints.el_stats.transport.respondingTimeouts.writeTimeout=${ENTRYPOINT_WRITE_TIMEOUT:-30s}"
      - "--entrypoints.el_stats.transport.respondingTimeouts.idleTimeout=${ENTRYPOINT_IDLE_TIMEOUT:-60s}"
      - "--entrypoints.el_stats.forwardedHeaders.trustedIPs=${ORCHESTRA_TRUSTED_PROXIES:-}"
      - "--certificatesresolvers.myresolver.acme.email=${IGRA_ORCHESTRA_DOMAIN_EMAIL}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
      - "8001:8001"
      - "8010:8010"
      - "8545:8545"
      - "9001:9001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/traefik:/etc/traefik
      - traefik_certs:/letsencrypt
      - *dependency-watch-volume
    networks:
      - igra-network
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.cors.headers.accesscontrolallowmethods=GET,OPTIONS,PUT,POST,DELETE"
      - "traefik.http.middlewares.cors.headers.accesscontrolalloworiginlist=*"
      - "traefik.http.middlewares.cors.headers.accesscontrolallowheaders=*"
      - "traefik.http.middlewares.cors.headers.accesscontrolmaxage=100"
      - "traefik.http.middlewares.cors.headers.addvaryheader=true"
      # Add redirect middleware for HTTP to HTTPS
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"
      # health-rate-limit and rpc-buffering live in config/traefik/dynamic.yml
      # (file provider) — the docker provider fails to expose them to routers
      # declared on rpc-provider-* / execution-layer containers. Routers
      # reference them as `health-rate-limit@file` and `rpc-buffering@file`.
      # DoS hygiene (ENG-1020): per-real-IP rate limit and in-flight cap.
      # sourceCriterion.ipStrategy.excludedIPs strips trusted proxy hops from
      # X-Forwarded-For so buckets key on the real client IP.
      - "traefik.http.middlewares.rpc-rate-limit.ratelimit.average=${RPC_RATE_LIMIT_AVERAGE:-200}"
      - "traefik.http.middlewares.rpc-rate-limit.ratelimit.burst=${RPC_RATE_LIMIT_BURST:-400}"
      - "traefik.http.middlewares.rpc-rate-limit.ratelimit.period=${RPC_RATE_LIMIT_PERIOD:-1s}"
      - "traefik.http.middlewares.rpc-rate-limit.ratelimit.sourcecriterion.ipstrategy.excludedips=${ORCHESTRA_TRUSTED_PROXIES:-}"
      - "traefik.http.middlewares.rpc-in-flight.inflightreq.amount=${RPC_MAX_IN_FLIGHT:-128}"
      - "traefik.http.middlewares.rpc-in-flight.inflightreq.sourcecriterion.ipstrategy.excludedips=${ORCHESTRA_TRUSTED_PROXIES:-}"
      # No retryexpression: JSON-RPC POSTs are not always idempotent
      # (e.g. eth_sendRawTransaction), so retrying on network error risks
      # duplicate transaction submission.
      # Apply redirect to web entrypoint for the specified host
      - "traefik.http.routers.web-redirect.rule=Host(`${IGRA_ORCHESTRA_DOMAIN}`)"
      - "traefik.http.routers.web-redirect.entrypoints=web"
      - "traefik.http.routers.web-redirect.middlewares=redirect-to-https"
      # Define a router for websecure (HTTPS) — low priority so specific path routers win
      - "traefik.http.routers.websecure-router.rule=Host(`${IGRA_ORCHESTRA_DOMAIN}`)"
      - "traefik.http.routers.websecure-router.entrypoints=websecure"
      - "traefik.http.routers.websecure-router.priority=1"
      - "traefik.http.routers.websecure-router.tls=true"
      - "traefik.http.routers.websecure-router.tls.certresolver=myresolver"
      - "traefik.http.routers.websecure-router.middlewares=rpc-rate-limit,rpc-in-flight,rpc-buffering@file"
    healthcheck:
      <<: *default-healthcheck
      test:
        - CMD-SHELL
        - >
          wget --quiet --spider --tries=1 --timeout=2 http://localhost:8080 &&
          (
            wget --quiet --spider --tries=1 --timeout=2 http://rpc-provider-0:8535/health ||
            wget --quiet --spider --tries=1 --timeout=2 http://rpc-provider-1:8535/health ||
            wget --quiet --spider --tries=1 --timeout=2 http://rpc-provider-2:8535/health ||
            wget --quiet --spider --tries=1 --timeout=2 http://rpc-provider-3:8535/health ||
            wget --quiet --spider --tries=1 --timeout=2 http://rpc-provider-4:8535/health ||
            wget --quiet --spider --tries=1 --timeout=2 http://rpc-provider-5:8535/health ||
            wget --quiet --spider --tries=1 --timeout=2 http://rpc-provider-6:8535/health ||
            wget --quiet --spider --tries=1 --timeout=2 http://rpc-provider-7:8535/health ||
            wget --quiet --spider --tries=1 --timeout=2 http://rpc-provider-8:8535/health ||
            wget --quiet --spider --tries=1 --timeout=2 http://rpc-provider-9:8535/health ||
            wget --quiet --spider --tries=1 --timeout=2 http://rpc-provider-10:8535/health ||
            wget --quiet --spider --tries=1 --timeout=2 http://rpc-provider-11:8535/health ||
            wget --quiet --spider --tries=1 --timeout=2 http://rpc-provider-12:8535/health ||
            wget --quiet --spider --tries=1 --timeout=2 http://rpc-provider-13:8535/health ||
            wget --quiet --spider --tries=1 --timeout=2 http://rpc-provider-14:8535/health ||
            wget --quiet --spider --tries=1 --timeout=2 http://rpc-provider-15:8535/health ||
            wget --quiet --spider --tries=1 --timeout=2 http://rpc-provider-16:8535/health ||
            wget --quiet --spider --tries=1 --timeout=2 http://rpc-provider-17:8535/health ||
            wget --quiet --spider --tries=1 --timeout=2 http://rpc-provider-18:8535/health ||
            wget --quiet --spider --tries=1 --timeout=2 http://rpc-provider-19:8535/health
          )
      timeout: 12s

  # Wallet Balance API
  wallet-balance-api:
    <<: *default-service
    image: docker:27-cli
    profiles: ["wallet-api"]
    container_name: wallet-balance-api
    restart: *service-restart-policy
    environment:
      - WALLET_API_BASICAUTH
    entrypoint: ["sh", "/app/serve.sh"]
    volumes:
      # Docker socket for querying kaswallet containers (same pattern as Traefik).
      # Protected by Traefik BasicAuth + rate limiting.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./scripts/wallet-balance-api.sh:/app/serve.sh:ro
    expose:
      - "8090"
    networks:
      - igra-network
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wallet-api.rule=Host(`${IGRA_ORCHESTRA_DOMAIN}`) && Path(`/internal/wallets`)"
      - "traefik.http.routers.wallet-api.priority=200"
      - "traefik.http.routers.wallet-api.entrypoints=websecure"
      - "traefik.http.routers.wallet-api.tls=true"
      - "traefik.http.routers.wallet-api.tls.certresolver=myresolver"
      - "traefik.http.routers.wallet-api.middlewares=wallet-ratelimit,wallet-auth"
      - "traefik.http.middlewares.wallet-ratelimit.ratelimit.average=5"
      - "traefik.http.middlewares.wallet-ratelimit.ratelimit.period=10s"
      - "traefik.http.middlewares.wallet-ratelimit.ratelimit.burst=10"
      - "traefik.http.middlewares.wallet-auth.basicauth.users=${WALLET_API_BASICAUTH}"
      - "traefik.http.services.wallet-api.loadbalancer.server.port=8090"
    # Note: no healthcheck — Traefik filters containers with failing/starting healthchecks,
    # and the apk install at startup delays socat readiness. Traefik will route to this
    # container as soon as it's running. The /health endpoint is still available internally.

  # ATAN Uploader
  atan-uploader:
    <<: *default-service
    image: igranetwork/atan-uploader:${ATAN_UPLOADER_VERSION}
    profiles: ["atan-uploader"]
    container_name: atan-uploader
    restart: unless-stopped
    environment:
      # AWS credentials (required)
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      # AWS S3 configuration (with defaults)
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-atan-import}
      CDN_BASE_URL: ${CDN_BASE_URL}
      # Network and transaction configuration (required)
      NETWORK: ${NETWORK}
      TX_ID_PREFIX: ${TX_ID_PREFIX:?TX_ID_PREFIX must be set (empty prefix degrades post-Toccata ATAN filtering to lane-only; see doc/node-operations/environment-reference.md)}
      IGRA_LANE_ID: ${IGRA_LANE_ID:?IGRA_LANE_ID must be set (4-byte post-Toccata lane namespace; see doc/node-operations/environment-reference.md)}
      # Data directory path (required, must match NETWORK)
      DATADIR: ${DATADIR:-}
      # Upload jitter for multi-node stagger (seconds, 0 = disabled)
      UPLOAD_JITTER_MAX_SECONDS: ${UPLOAD_JITTER_MAX_SECONDS:-60}
    volumes:
      - kaspad_data:/app/data/
    healthcheck:
      <<: *default-healthcheck
      test: ["CMD-SHELL", "pgrep -f atan-uploader > /dev/null || exit 1"]
