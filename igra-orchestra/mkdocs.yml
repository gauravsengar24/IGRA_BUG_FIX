site_name: IGRA Orchestra
site_description: Docker Compose-based deployment for IGRA Orchestra components
site_url: https://igralabs.github.io/igra-orchestra/
repo_url: https://github.com/IgraLabs/igra-orchestra
repo_name: IgraLabs/igra-orchestra

docs_dir: doc

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - attr_list
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Deployment Guides:
    - Mainnet: quick-setup-mainnet.md
    - Galleon Testnet: quick-setup-galleon-testnet.md
  - Operations:
    - Node Operations:
      - Overview: node-operations/index.md
      - Worker Configuration: node-operations/worker-configuration.md
      - Wallet Management: node-operations/wallet-management.md
      - Health Check: node-operations/health-check.md
      - ATAN-Only Mode: node-operations/atan-only.md
      - ATAN Verification: node-operations/atan-verification.md
      - Environment Reference: node-operations/environment-reference.md
      - Running a CPU Miner: node-operations/running-a-cpu-miner.md
      - Galleon → testnet-10 Migration: node-operations/migrate-galleon-to-testnet-10.md
      - Toccata Upgrade — Part One (v2.3 → v3.0): node-operations/upgrade-mainnet-v2.3-to-v3.0.md
    - Kaspa Wallet: kaspa-wallet.md
    - Log Management: log-management.md
  - Troubleshooting:
    - Docker Volume Permissions: troubleshooting/docker-volume-permissions.md
    - Kaspad DB Upgrade Prompt: troubleshooting/kaspad-db-upgrade.md
    - Service Restart Debugging: troubleshooting/service-restart-debugging.md
    - SSL Certificate: troubleshooting/ssl-certificate.md
